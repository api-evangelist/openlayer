description: >-
  FinOps view of Openlayer spend. Openlayer is a subscription/seat-and-usage
  platform: a free Basic plan with a monthly production-inference cap, and a
  sales-led Enterprise plan with unlimited usage and custom terms. The primary
  usage meter is production inferences (rows published to inference pipelines);
  seats and projects are seat/quota dimensions. Public dollar rates for
  Enterprise are not published, so cost figures are not reconciled here.
notes: >-
  Enterprise pricing is negotiated; confirm contract structure, included
  inference volume, overage handling, and seat counts during reconciliation.
sources:
- https://www.openlayer.com/pricing
