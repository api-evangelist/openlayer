meters:
- name: production_inferences
  description: Rows published to inference pipelines via the data-stream endpoint; the primary usage meter, capped on Basic.
  unit: inferences
  aggregation: sum
  dimensions:
  - workspace
  - project
  - inference_pipeline
- name: seats
  description: Member seats included in the plan.
  unit: seats
  aggregation: max
  dimensions:
  - workspace
- name: projects
  description: Projects created in the workspace, subject to plan quota.
  unit: projects
  aggregation: max
  dimensions:
  - workspace
- name: subscription_fee
  description: Recurring plan/subscription charge (Enterprise; negotiated).
  unit: contract
  aggregation: sum
  dimensions:
  - workspace
principles:
- name: Visibility
  description: Track production-inference volume per project and pipeline against the plan cap; monitor seat and project counts.
- name: Allocation
  description: Map workspaces, projects, and pipelines to teams/cost centers; tag API keys per workload.
- name: Optimization
  description: Sample or batch production data sensibly to stay within inference quotas; archive unused projects and pipelines.
- name: Accountability
  description: Assign owners per project; review inference burn and seat utilization against the plan monthly.
